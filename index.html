<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends — Stream</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════════════ */
:root {
  --ink:       #08080f;
  --deep:      #0e0e1a;
  --surface:   #13131f;
  --raised:    #1c1c2e;
  --line:      rgba(255,255,255,0.06);
  --line2:     rgba(255,255,255,0.1);
  --amber:     #f0a500;
  --amber-dim: rgba(240,165,0,0.15);
  --text:      #ede9e0;
  --text2:     #8a8595;
  --text3:     #4a4660;
  --green:     #00e57a;
  --r:         12px;
  --r-lg:      18px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  background: var(--ink);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Film grain */
body::before {
  content:''; position:fixed; inset:0; z-index:9998; pointer-events:none; opacity:0.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--raised);border-radius:10px}

/* ═══════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════ */
header {
  position:fixed; top:0; left:0; right:0; z-index:500;
  height:62px; display:flex; align-items:center; justify-content:space-between;
  padding:0 2.5rem;
  background:linear-gradient(to bottom,rgba(8,8,15,0.98) 0%,rgba(8,8,15,0) 100%);
  transition:background 0.3s;
}
header.solid { background:rgba(8,8,15,0.97); border-bottom:1px solid var(--line); backdrop-filter:blur(20px); }

.logo {
  font-family:'Cormorant Garamond',serif; font-size:1.45rem; font-weight:600;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--amber);
  text-shadow:0 0 40px rgba(240,165,0,0.5); cursor:default; user-select:none;
}
.logo sup {
  font-family:'Syne',sans-serif; font-size:0.45rem; font-weight:700;
  letter-spacing:0.2em; color:var(--text2); vertical-align:super; margin-left:4px; text-transform:uppercase;
}

.header-right { display:flex; align-items:center; gap:0.8rem; }
.stat-chip {
  display:flex; align-items:center; gap:0.45rem;
  background:var(--surface); border:1px solid var(--line);
  border-radius:100px; padding:0.3rem 0.9rem;
  font-size:0.7rem; font-weight:600; color:var(--text2); letter-spacing:0.04em;
}
.stat-chip .dot {
  width:5px; height:5px; border-radius:50%; background:var(--green);
  box-shadow:0 0 8px var(--green); animation:pulse 2s ease infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.hdr-btn {
  background:transparent; border:1px solid var(--line2); color:var(--text2);
  font-family:'Syne',sans-serif; font-size:0.7rem; font-weight:600; letter-spacing:0.06em;
  padding:0.3rem 0.85rem; border-radius:8px; cursor:pointer; transition:all 0.18s;
}
.hdr-btn:hover { color:#e05050; border-color:rgba(224,80,80,0.4); background:rgba(224,80,80,0.06); }

/* ═══════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════ */
#hero {
  display:none; padding:110px 2.5rem 0; position:relative; overflow:hidden;
  animation:heroIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes heroIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
#hero::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 60% 100% at 0% 100%,rgba(240,165,0,0.06) 0%,transparent 70%);
}
.hero-inner {
  max-width:1280px; margin:0 auto;
  display:grid; grid-template-columns:1fr auto; align-items:end; gap:2rem; padding-bottom:2.5rem;
  border-bottom:1px solid var(--line);
}
.hero-eyebrow { display:flex; align-items:center; gap:0.7rem; margin-bottom:0.9rem; }
.hero-eyebrow span { font-size:0.62rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--amber); }
.eyebrow-line { flex:0 0 28px; height:1px; background:var(--amber); opacity:0.5; }
.hero-title {
  font-family:'Cormorant Garamond',serif; font-size:clamp(1.6rem,3.5vw,2.8rem);
  font-weight:600; line-height:1.1; color:#fff; margin-bottom:0.55rem; letter-spacing:-0.01em;
}
.hero-meta { font-size:0.78rem; color:var(--text2); font-weight:400; }
.hero-actions { display:flex; gap:0.6rem; align-items:center; padding-bottom:0.2rem; }
.btn-hero-primary {
  display:flex; align-items:center; gap:0.5rem;
  background:var(--amber); color:#000; border:none; border-radius:10px;
  font-family:'Syne',sans-serif; font-size:0.82rem; font-weight:700; letter-spacing:0.04em;
  padding:0.65rem 1.4rem; cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.btn-hero-primary:hover { background:#ffc840; transform:translateY(-1px); box-shadow:0 8px 24px rgba(240,165,0,0.3); }
.btn-hero-primary svg { width:14px; height:14px; fill:currentColor; }
.btn-hero-ghost {
  display:flex; align-items:center; gap:0.5rem;
  background:rgba(255,255,255,0.07); color:var(--text); border:1px solid var(--line2); border-radius:10px;
  font-family:'Syne',sans-serif; font-size:0.82rem; font-weight:600;
  padding:0.65rem 1.2rem; cursor:pointer; transition:all 0.2s;
}
.btn-hero-ghost:hover { background:rgba(255,255,255,0.11); }

/* ═══════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════ */
main { max-width:1280px; margin:0 auto; padding:0 2.5rem 6rem; }
.top-spacer { height:62px; }
#hero-spacer { height:62px; }

/* ═══════════════════════════════════════════════
   TOOLBAR
═══════════════════════════════════════════════ */
.toolbar {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:1rem; padding:2rem 0 1.6rem;
}
.seasons-scroll { display:flex; gap:0.25rem; flex-wrap:wrap; }
.s-tab {
  background:transparent; border:1px solid var(--line); color:var(--text3);
  font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:0.08em;
  padding:0.32rem 0.85rem; border-radius:100px; cursor:pointer; transition:all 0.18s; text-transform:uppercase;
}
.s-tab:hover { border-color:rgba(240,165,0,0.3); color:var(--amber); }
.s-tab.active { background:var(--amber); border-color:var(--amber); color:#000; font-weight:800; box-shadow:0 0 20px rgba(240,165,0,0.25); }

.toolbar-right { display:flex; align-items:center; gap:0.6rem; }
.btn-random {
  display:flex; align-items:center; gap:0.5rem;
  background:var(--raised); border:1px solid rgba(139,92,246,0.3); color:#c4b5fd;
  font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:0.08em;
  padding:0.4rem 1rem; border-radius:100px; cursor:pointer;
  transition:all 0.2s; text-transform:uppercase; white-space:nowrap;
  box-shadow:0 0 20px rgba(139,92,246,0.1);
}
.btn-random:hover { background:rgba(139,92,246,0.15); border-color:rgba(139,92,246,0.5); transform:translateY(-1px); box-shadow:0 4px 20px rgba(139,92,246,0.2); }
.btn-random svg { width:13px; height:13px; fill:currentColor; }
.btn-random.spinning svg { animation:spin 0.5s ease; }
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════════════ */
.section-hd { display:flex; align-items:baseline; gap:0.8rem; margin-bottom:1.4rem; }
.section-hd h2 {
  font-family:'Cormorant Garamond',serif; font-size:1.7rem; font-weight:600;
  color:#fff; letter-spacing:-0.01em;
}
.section-hd span { font-size:0.72rem; color:var(--text3); font-weight:600; letter-spacing:0.08em; text-transform:uppercase; }

/* ═══════════════════════════════════════════════
   EPISODE GRID
═══════════════════════════════════════════════ */
.ep-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem;
}
.ep-card {
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
  overflow:hidden; position:relative; cursor:pointer;
  transition:transform 0.25s cubic-bezier(0.16,1,0.3,1), border-color 0.2s, box-shadow 0.25s;
  transform-origin:center bottom;
}
.ep-card:hover {
  transform:translateY(-6px) scale(1.02);
  border-color:rgba(240,165,0,0.25);
  box-shadow:0 20px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(240,165,0,0.1);
}
.ep-card.ep-watched { opacity:0.45; }
.ep-card.ep-watched:hover { opacity:0.85; }
.ep-card.ep-current { border-color:var(--amber); box-shadow:0 0 0 2px rgba(240,165,0,0.2),0 12px 32px rgba(0,0,0,0.4); }

/* Thumbnail */
.ep-thumb { position:relative; width:100%; aspect-ratio:16/9; background:var(--deep); overflow:hidden; }
.thumb-glow { position:absolute; inset:0; background:radial-gradient(ellipse at 30% 60%,rgba(240,165,0,0.07) 0%,transparent 65%); }
.thumb-number {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-size:4rem; font-weight:600; font-style:italic;
  color:rgba(255,255,255,0.03); user-select:none; letter-spacing:-0.02em;
}
.thumb-hover {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0); transition:background 0.2s; z-index:2;
}
.ep-card:hover .thumb-hover { background:rgba(0,0,0,0.4); }
.play-ring {
  width:48px; height:48px; background:rgba(240,165,0,0.95); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:scale(0.7) rotate(-15deg);
  transition:opacity 0.22s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 8px 28px rgba(240,165,0,0.5);
}
.ep-card:hover .play-ring { opacity:1; transform:scale(1) rotate(0deg); }
.play-ring svg { width:18px; height:18px; fill:#000; margin-left:3px; }

.card-prog { position:absolute; bottom:0; left:0; right:0; height:2px; background:rgba(255,255,255,0.06); z-index:3; }
.card-prog-fill { height:100%; background:var(--amber); }

.badge {
  position:absolute; z-index:4;
  font-family:'Syne',sans-serif; font-size:0.55rem; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase; padding:0.2rem 0.55rem; border-radius:6px;
}
.bdg-watched { top:8px; right:8px; background:rgba(0,229,122,0.12); color:var(--green); border:1px solid rgba(0,229,122,0.25); }
.bdg-progress { top:8px; left:8px; background:rgba(240,165,0,0.15); color:var(--amber); border:1px solid rgba(240,165,0,0.3); }

.ep-info { padding:0.85rem 1rem 1rem; }
.ep-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.35rem; }
.ep-num { font-size:0.62rem; font-weight:800; color:var(--amber); letter-spacing:0.1em; text-transform:uppercase; }
.ep-dur { font-size:0.62rem; color:var(--text3); font-weight:600; }
.ep-name { font-family:'Syne',sans-serif; font-size:0.78rem; font-weight:600; color:var(--text); line-height:1.38; }

/* ═══════════════════════════════════════════════
   PLAYER MODAL
═══════════════════════════════════════════════ */
#overlay {
  display:none; position:fixed; inset:0; z-index:900;
  align-items:center; justify-content:center;
}
#overlay.open {
  display:flex;
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(18px) saturate(0.5);
  animation:overlayIn 0.3s ease both;
}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}

.player-shell {
  width:92vw; max-width:1060px;
  background:var(--deep); border:1px solid var(--line2); border-radius:20px;
  overflow:hidden;
  box-shadow:0 60px 120px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.06);
  animation:shellIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes shellIn{from{transform:scale(0.92) translateY(24px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* Player header */
.player-top {
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem 1.4rem; border-bottom:1px solid var(--line); gap:1.2rem;
}
.player-info { min-width:0; flex:1; }
.player-tag { font-size:0.6rem; font-weight:800; letter-spacing:0.18em; text-transform:uppercase; color:var(--amber); margin-bottom:0.22rem; }
.player-title {
  font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-weight:600; color:#fff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:0.01em;
}
.player-acts { display:flex; align-items:center; gap:0.4rem; flex-shrink:0; }
.p-icon-btn {
  width:34px; height:34px; border-radius:9px;
  background:rgba(255,255,255,0.05); border:1px solid var(--line); color:var(--text2);
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s;
}
.p-icon-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
.p-icon-btn svg { width:15px; height:15px; fill:currentColor; }

/* Video */
.video-box { position:relative; aspect-ratio:16/9; background:#000; overflow:hidden; }
#vid-iframe { display:none; width:100%; height:100%; border:none; }
#vid-ph {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:0.8rem;
  background:radial-gradient(ellipse at center,#12122a 0%,#08080f 100%);
}
.ph-icon { font-size:3.2rem; opacity:0.25; }
#ph-title { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; color:rgba(255,255,255,0.2); }
#vid-ph small { font-size:0.68rem; color:rgba(255,255,255,0.1); letter-spacing:0.05em; }

/* Loading spinner */
.vid-loader {
  position:absolute; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
  background:rgba(8,8,15,0.75); transition:opacity 0.5s;
}
.vid-loader.hide { opacity:0; pointer-events:none; }
.load-ring {
  width:42px; height:42px; border:2px solid rgba(240,165,0,0.12);
  border-top-color:var(--amber); border-radius:50%;
  animation:loadSpin 0.8s linear infinite;
}
@keyframes loadSpin{to{transform:rotate(360deg)}}

/* Controls */
.controls {
  padding:0.9rem 1.4rem 1.1rem;
  background:linear-gradient(to bottom,#0b0b17,#0e0e1a);
  border-top:1px solid var(--line);
}
.seek-row { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.7rem; }
.t { font-size:0.68rem; color:var(--text3); font-variant-numeric:tabular-nums; min-width:36px; font-weight:600; }
.t.r { text-align:right; }
.seekbar {
  flex:1; height:3px; background:rgba(255,255,255,0.08); border-radius:10px;
  cursor:pointer; position:relative; transition:height 0.15s;
}
.seekbar:hover { height:5px; }
.seekbar::before { content:''; position:absolute; inset:-8px 0; }
.seek-fill {
  height:100%; background:var(--amber); border-radius:10px;
  position:relative; pointer-events:none;
}
.seek-fill::after {
  content:''; position:absolute; right:-4px; top:50%;
  transform:translateY(-50%) scale(0); width:12px; height:12px;
  background:var(--amber); border-radius:50%; transition:transform 0.15s;
  box-shadow:0 0 12px rgba(240,165,0,0.6);
}
.seekbar:hover .seek-fill::after { transform:translateY(-50%) scale(1); }

.ctrl-row { display:flex; align-items:center; justify-content:space-between; }
.ctrl-l, .ctrl-r { display:flex; align-items:center; gap:0.2rem; }
.c-btn {
  background:transparent; border:none; color:rgba(255,255,255,0.45);
  width:38px; height:38px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:color 0.15s,background 0.15s;
}
.c-btn:hover { color:#fff; background:rgba(255,255,255,0.06); }
.c-btn svg { width:20px; height:20px; fill:currentColor; }
.c-btn.big { color:#fff; }
.c-btn.big svg { width:26px; height:26px; }

.vol-wrap { display:flex; align-items:center; gap:0.35rem; }
.vol-track { width:64px; height:3px; background:rgba(255,255,255,0.08); border-radius:10px; cursor:pointer; overflow:hidden; }
.vol-fill { height:100%; width:80%; background:rgba(255,255,255,0.3); border-radius:10px; pointer-events:none; }

.btn-next-ep {
  display:flex; align-items:center; gap:0.4rem;
  background:rgba(240,165,0,0.08); border:1px solid rgba(240,165,0,0.2); color:var(--amber);
  border-radius:10px; font-family:'Syne',sans-serif; font-size:0.7rem; font-weight:800;
  letter-spacing:0.06em; text-transform:uppercase; padding:0.42rem 0.95rem;
  cursor:pointer; transition:all 0.18s; white-space:nowrap;
}
.btn-next-ep:hover { background:rgba(240,165,0,0.15); border-color:rgba(240,165,0,0.4); transform:translateX(2px); }
.btn-next-ep svg { width:13px; height:13px; fill:currentColor; }

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
#toast {
  position:fixed; bottom:2.2rem; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surface); border:1px solid rgba(240,165,0,0.2); color:var(--text);
  padding:0.6rem 1.4rem; border-radius:100px; font-size:0.78rem; font-weight:600;
  letter-spacing:0.02em; opacity:0;
  transition:opacity 0.25s, transform 0.3s cubic-bezier(0.16,1,0.3,1);
  z-index:9999; pointer-events:none; box-shadow:0 12px 40px rgba(0,0,0,0.5); white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media(max-width:700px){
  header{padding:0 1.2rem}
  #hero{padding:90px 1.2rem 0}
  main{padding:0 1.2rem 5rem}
  .player-shell{width:100vw;border-radius:0}
  .ep-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:0.75rem}
  .vol-wrap{display:none}
}
</style>
</head>
<body>

<header id="hdr">
  <div class="logo">Friends<sup>Stream</sup></div>
  <div class="header-right">
    <div class="stat-chip"><span class="dot"></span><span id="watch-stat">Loading…</span></div>
    <button class="hdr-btn" onclick="resetProgress()">Reset</button>
  </div>
</header>

<!-- HERO -->
<div id="hero">
  <div class="hero-inner">
    <div>
      <div class="hero-eyebrow">
        <div class="eyebrow-line"></div>
        <span id="hero-eyebrow">Continue Watching</span>
      </div>
      <div class="hero-title" id="hero-title">Episode Title</div>
      <div class="hero-meta"  id="hero-meta">Season 1 · Episode 1</div>
    </div>
    <div class="hero-actions">
      <button class="btn-hero-primary" onclick="resumeWatching()">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        Resume
      </button>
      <button class="btn-hero-ghost" onclick="dismissHero()">Dismiss</button>
    </div>
  </div>
</div>
<div id="hero-spacer"></div>

<main>
  <div class="top-spacer"></div>
  <div class="toolbar">
    <div class="seasons-scroll" id="seasons-nav"></div>
    <div class="toolbar-right">
      <button class="btn-random" id="random-btn" onclick="playRandom()">
        <svg viewBox="0 0 24 24"><path d="M17 17h2v2l3-3-3-3v2h-2v2zm-2-12h2v2h-4l-1.41 1.41L10.18 7H3v2h6.41l7 7H21v2h2v-2l-3-3 3-3V7h-8.41L12 5.59zM3 17h6.41l1.41-1.41L9.41 14H3v3z"/></svg>
        Surprise Me
      </button>
    </div>
  </div>
  <div class="section-hd">
    <h2 id="season-label">Season 1</h2>
    <span id="ep-count-label"></span>
  </div>
  <div class="ep-grid" id="ep-grid"></div>
</main>

<!-- PLAYER -->
<div id="overlay">
  <div class="player-shell">
    <div class="player-top">
      <div class="player-info">
        <div class="player-tag"   id="p-tag">S1 · E1</div>
        <div class="player-title" id="p-title">Episode Title</div>
      </div>
      <div class="player-acts">

// Episode duration per season (minutes)
const EP_DUR = { 1:22,2:22,3:22,4:22,5:22,6:22,7:22,8:22,9:22,10:22 };

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
const SK = 'fstream_v5';
let ST = (() => { try{ const r=localStorage.getItem(SK); if(r) return JSON.parse(r); }catch(e){} return{lastS:0,lastE:0,eps:{}}; })();
const persist = () => localStorage.setItem(SK, JSON.stringify(ST));
const ekey = (s,e) => s+':'+e;
const getE = (s,e) => ST.eps[ekey(s,e)] || {t:0,w:false};
const setE = (s,e,d) => { ST.eps[ekey(s,e)]=Object.assign({},getE(s,e),d); persist(); };

let curSeason = 0;
let curEp = null; // {si, ei}

/* Wall-clock playback */
let playing=false, rafId=null;
let clock=0, total=0;
let wallStart=null, clockAtStart=0, lastSave=0;

/* ═══════════════════════════════════════════════════════
   SCROLL HEADER
═══════════════════════════════════════════════════════ */
window.addEventListener('scroll', () => {
  document.getElementById('hdr').classList.toggle('solid', window.scrollY > 40);
}, { passive:true });

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function buildNav() {
  const nav = document.getElementById('seasons-nav');
  nav.innerHTML = '';
  SEASONS.forEach((S,i) => {
    const b = document.createElement('button');
    b.className = 's-tab' + (i===curSeason?' active':'');
    b.textContent = 'S'+S.s;
    b.onclick = () => { curSeason=i; renderSeason(); };
    nav.appendChild(b);
  });
}

function renderSeason() {
  buildNav();
  const S = SEASONS[curSeason];
  document.getElementById('season-label').textContent = 'Season '+S.s;
  document.getElementById('ep-count-label').textContent = S.eps.length+' episodes';

  const grid = document.getElementById('ep-grid');
  grid.innerHTML = '';

  S.eps.forEach((title, i) => {
    const e = getE(curSeason, i);
    const isCur = ST.lastS===curSeason && ST.lastE===i;
    const dur = EP_DUR[S.s] * 60;
    const pct = e.t>0 ? Math.min((e.t/dur)*100,100) : 0;

    const card = document.createElement('div');
    card.className = 'ep-card' + (e.w?' ep-watched':'') + (isCur&&!e.w?' ep-current':'');
    card.onclick = () => openPlayer(curSeason, i);

    card.innerHTML =
      '<div class="ep-thumb">' +
        '<div class="thumb-glow"></div>' +
        '<div class="thumb-number">'+String(i+1).padStart(2,'0')+'</div>' +
        '<div class="thumb-hover"><div class="play-ring"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>' +
        (e.w ? '<div class="badge bdg-watched">✓ Watched</div>' : '') +
        (isCur&&!e.w&&e.t>0 ? '<div class="badge bdg-progress">▶ Resume</div>' : '') +
        (pct>0&&!e.w ? '<div class="card-prog"><div class="card-prog-fill" style="width:'+pct+'%"></div></div>' : '') +
      '</div>' +
      '<div class="ep-info">' +
        '<div class="ep-top"><span class="ep-num">E'+(i+1)+'</span><span class="ep-dur">'+EP_DUR[S.s]+'m</span></div>' +
        '<div class="ep-name">'+title+'</div>' +
      '</div>';

    grid.appendChild(card);
  });

  updateStat();
  renderHero();
}

function updateStat() {
  let w=0, tot=0;
  SEASONS.forEach((S,si) => S.eps.forEach((_,ei) => { tot++; if(getE(si,ei).w) w++; }));
  document.getElementById('watch-stat').textContent = w+' / '+tot;
}

function renderHero() {
  const hero = document.getElementById('hero');
  const spacer = document.getElementById('hero-spacer');
  const any = Object.values(ST.eps).some(e=>e.t>0||e.w);
  if(!any){ hero.style.display='none'; spacer.style.display='block'; return; }

  const e = getE(ST.lastS, ST.lastE);
  if(e.w) {
    const nx = nextFrom(ST.lastS, ST.lastE);
    if(!nx){ hero.style.display='none'; spacer.style.display='block'; return; }
    const nS=SEASONS[nx.si];
    document.getElementById('hero-eyebrow').textContent='Up Next';
    document.getElementById('hero-title').textContent=nS.eps[nx.ei];
    document.getElementById('hero-meta').textContent='Season '+nS.s+' \u00b7 Episode '+(nx.ei+1);
  } else {
    const S=SEASONS[ST.lastS], title=S.eps[ST.lastE];
    const m=Math.floor(e.t/60), sc=String(Math.floor(e.t%60)).padStart(2,'0');
    document.getElementById('hero-eyebrow').textContent='Continue Watching';
    document.getElementById('hero-title').textContent=title;
    document.getElementById('hero-meta').textContent='Season '+S.s+' \u00b7 Episode '+(ST.lastE+1)+' \u00b7 '+m+':'+sc+' in';
  }
  hero.style.display='block';
  spacer.style.display='none';
}

function dismissHero() {
  document.getElementById('hero').style.display='none';
  document.getElementById('hero-spacer').style.display='block';
}

/* ═══════════════════════════════════════════════════════
   PLAYER
═══════════════════════════════════════════════════════ */
function openPlayer(si, ei) {
  const S = SEASONS[si];
  const title = S.eps[ei];
  const e = getE(si, ei);
  const dur = EP_DUR[S.s];

  curEp = {si, ei};
  ST.lastS=si; ST.lastE=ei; persist();

  // Header
  document.getElementById('p-tag').textContent = 'S'+S.s+' \u00b7 E'+(ei+1);
  document.getElementById('p-title').textContent = title;

  // Load iframe — VidKing uses 1-based episode numbers
  const iframe  = document.getElementById('vid-iframe');
  const ph      = document.getElementById('vid-ph');
  const loader  = document.getElementById('vid-loader');

  loader.classList.remove('hide');
  iframe.src = vidURL(S.s, ei+1);
  iframe.style.display = 'block';
  ph.style.display = 'none';

  // Hide loader after the iframe has had time to load
  setTimeout(() => loader.classList.add('hide'), 3500);

  // Clock
  total = dur * 60;
  clock = e.w ? 0 : (e.t || 0);

  // Open overlay
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  updateSeekUI();
  // Auto-start clock immediately — synced with iframe load
  clockStart();
}

function closePlayer() {
  clockStop(); saveClock();
  const iframe = document.getElementById('vid-iframe');
  iframe.src = '';
  iframe.style.display = 'none';
  document.getElementById('vid-ph').style.display = 'flex';
  document.getElementById('vid-loader').classList.add('hide');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  renderSeason();
}

function saveClock() {
  if(!curEp) return;
  const {si,ei}=curEp;
  setE(si,ei,{t:clock,w:clock>=total*0.92});
  ST.lastS=si; ST.lastE=ei; persist();
}

/* ═══════════════════════════════════════════════════════
   WALL-CLOCK ENGINE
═══════════════════════════════════════════════════════ */
function clockStart() {
  if(playing) return;
  playing=true; wallStart=Date.now(); clockAtStart=clock;
  updatePlayIcon(); scheduleTick();
}
function clockPause() {
  if(!playing) return;
  clock=clockAtStart+(Date.now()-wallStart)/1000;
  playing=false; updatePlayIcon(); cancelTick(); saveClock();
}
function clockStop() { playing=false; cancelTick(); }
function scheduleTick() { rafId=requestAnimationFrame(tick); }
function cancelTick() { if(rafId){cancelAnimationFrame(rafId);rafId=null;} }

function tick() {
  if(!playing) return;
  clock=clockAtStart+(Date.now()-wallStart)/1000;
  if(clock>=total){ clock=total; updateSeekUI(); onEnded(); return; }
  updateSeekUI();
  if(Date.now()-lastSave>8000){ saveClock(); lastSave=Date.now(); }
  scheduleTick();
}

function onEnded() {
  clockStop(); playing=false; updatePlayIcon(); saveClock();
  toast('Episode complete — loading next…');
  setTimeout(skipToNext,1600);
}

function togglePlay() { if(playing) clockPause(); else clockStart(); }

function updatePlayIcon() {
  document.getElementById('pp-icon').innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function onSeek(ev) {
  const bar=document.getElementById('seekbar'), r=bar.getBoundingClientRect();
  clock=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width))*total;
  wallStart=Date.now(); clockAtStart=clock;
  updateSeekUI(); saveClock();
}

function skip(sec) {
  clock=Math.max(0,Math.min(total,clock+sec));
  wallStart=Date.now(); clockAtStart=clock;
  updateSeekUI();
  if(clock>=total) onEnded();
}

function updateSeekUI() {
  const pct=total>0?(clock/total)*100:0;
  document.getElementById('seek-fill').style.width=pct+'%';
  document.getElementById('t-now').textContent=fmt(clock);
  document.getElementById('t-end').textContent=fmt(total);
}

const fmt = s => Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');

function skipToNext() {
  if(!curEp) return;
  const nx=nextFrom(curEp.si,curEp.ei);
  if(!nx){ toast('🎬 That was the series finale!'); closePlayer(); return; }
  clockStop(); openPlayer(nx.si,nx.ei);
  toast('Now playing S'+SEASONS[nx.si].s+' E'+(nx.ei+1));
}

function nextFrom(si,ei) {
  let nei=ei+1, nsi=si;
  if(nei>=SEASONS[si].eps.length){ nsi++; nei=0; }
  if(nsi>=SEASONS.length) return null;
  return {si:nsi,ei:nei};
}

function toggleMute() {
  const ico=document.getElementById('vol-ico');
  ico.innerHTML=ico.innerHTML.includes('M16.5')
    ?'<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>'
    :'<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17 18.73l2 2L20.73 19 4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>';
}

function setVol(ev) {
  const bar=document.querySelector('.vol-track'),r=bar.getBoundingClientRect();
  document.getElementById('vol-fill').style.width=(Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width))*100)+'%';
}

/* ═══════════════════════════════════════════════════════
   RESUME & RANDOM
═══════════════════════════════════════════════════════ */
function resumeWatching() {
  const e=getE(ST.lastS,ST.lastE);
  if(e.w){ const nx=nextFrom(ST.lastS,ST.lastE); if(nx){curSeason=nx.si;renderSeason();openPlayer(nx.si,nx.ei);}else toast('You\'ve seen everything!'); }
  else{ curSeason=ST.lastS; renderSeason(); openPlayer(ST.lastS,ST.lastE); }
}

function playRandom() {
  const btn=document.getElementById('random-btn');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'),500);
  // pick random episode from any season
  const total_eps = SEASONS.reduce((a,S)=>a+S.eps.length,0);
  const pick = Math.floor(Math.random()*total_eps);
  let count=0;
  for(let si=0;si<SEASONS.length;si++){
    for(let ei=0;ei<SEASONS[si].eps.length;ei++){
      if(count===pick){
        curSeason=si; renderSeason();
        setTimeout(()=>{ openPlayer(si,ei); toast('🎲 Random — S'+SEASONS[si].s+' E'+(ei+1)); },180);
        return;
      }
      count++;
    }
  }
}

function resetProgress() {
  if(!confirm('Reset all watch progress?')) return;
  localStorage.removeItem(SK);
  ST={lastS:0,lastE:0,eps:{}}; curSeason=0; renderSeason();
  document.getElementById('hero').style.display='none';
  document.getElementById('hero-spacer').style.display='block';
  toast('Progress cleared');
}

   TOAST
═══════════════════════════════════════════════════════ */
let toastTmr;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTmr); toastTmr=setTimeout(()=>el.classList.remove('show'),2800);
}

/* ═══════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════ */
document.addEventListener('keydown', ev => {
  if(!document.getElementById('overlay').classList.contains('open')) return;
  if(ev.key==='Escape')     closePlayer();
  if(ev.key===' ')          { ev.preventDefault(); togglePlay(); }
  if(ev.key==='ArrowRight') skip(30);
  if(ev.key==='ArrowLeft')  skip(-10);
  if(ev.key==='n'||ev.key==='N') skipToNext();
});

document.getElementById('overlay').addEventListener('click', ev => {
  if(ev.target===document.getElementById('overlay')) closePlayer();
});

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
renderSeason();
</script>
