<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends — FriendsTV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Netflix+Sans:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────
   NETFLIX DESIGN SYSTEM
───────────────────────────────────────────── */
:root {
  --netflix-red:   #e50914;
  --netflix-red-h: #f40612;
  --bg:            #141414;
  --bg-light:      #1f1f1f;
  --bg-card:       #2f2f2f;
  --surface:       #181818;
  --border:        rgba(255,255,255,0.1);
  --text:          #ffffff;
  --text2:         #d2d2d2;
  --text3:         #8c8c8c;
  --text4:         #6d6d6e;
  --green:         #46d369;
  --font:          'Inter', -apple-system, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3d3d3d; border-radius: 4px; }

/* ─────────────────────────────────────────────
   NETFLIX HEADER
───────────────────────────────────────────── */
.nf-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: 68px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4%;
  transition: background 0.4s;
}
.nf-header.scrolled {
  background: var(--bg);
}
.nf-header::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(20,20,20,0.9) 0%, transparent 100%);
  z-index: -1;
  transition: opacity 0.4s;
}
.nf-header.scrolled::before { opacity: 0; }

.nf-logo {
  font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em;
  color: var(--netflix-red); cursor: default; user-select: none;
  text-transform: uppercase;
  text-shadow: 0 2px 8px rgba(229,9,20,0.4);
}

.nf-header-right {
  display: flex; align-items: center; gap: 1.2rem;
}
.nf-stat {
  font-size: 0.8rem; font-weight: 500; color: var(--text3);
  display: flex; align-items: center; gap: 0.5rem;
}
.nf-stat .watched-count { color: var(--text2); font-weight: 600; }
.nf-btn-reset {
  background: transparent; border: 1px solid rgba(255,255,255,0.2);
  color: var(--text3); font-family: var(--font); font-size: 0.75rem; font-weight: 500;
  padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.nf-btn-reset:hover { border-color: #fff; color: #fff; }

/* ─────────────────────────────────────────────
   HERO BANNER  (Netflix-style full-width)
───────────────────────────────────────────── */
#nf-hero {
  display: none;
  position: relative;
  height: 56vw; max-height: 640px; min-height: 340px;
  background: linear-gradient(to bottom right, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
  overflow: hidden;
}

/* Pattern background for visual richness */
#nf-hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 40%, rgba(229,9,20,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 80% at 70% 60%, rgba(0,0,0,0.6) 0%, transparent 70%);
}

.hero-fade-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(to bottom, transparent 0%, var(--bg) 100%);
  z-index: 2;
}
.hero-fade-left {
  position: absolute; top: 0; left: 0; bottom: 0; width: 40%;
  background: linear-gradient(to right, rgba(20,20,20,0.95) 0%, transparent 100%);
  z-index: 2;
}

.hero-content {
  position: absolute; bottom: 22%; left: 4%; z-index: 3;
  max-width: 560px;
}
.hero-logo-text {
  font-size: clamp(2.2rem, 5vw, 4rem);
  font-weight: 700; letter-spacing: -0.02em;
  color: #fff; line-height: 1;
  margin-bottom: 1.1rem;
  text-shadow: 2px 2px 12px rgba(0,0,0,0.8);
}
.hero-desc {
  font-size: clamp(0.85rem, 1.4vw, 1rem); font-weight: 400;
  color: var(--text2); line-height: 1.5; margin-bottom: 1.4rem;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
  max-width: 480px;
}
.hero-meta-row {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 1.5rem; flex-wrap: wrap;
}
.hero-badge {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
  padding: 0.22rem 0.6rem; border-radius: 3px; text-transform: uppercase;
}
.badge-year  { color: var(--text3); }
.badge-seasons { background: rgba(255,255,255,0.1); color: var(--text2); }
.badge-rating  { border: 1px solid var(--green); color: var(--green); }
.badge-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); }

.hero-btns { display: flex; gap: 0.75rem; flex-wrap: wrap; }

.nf-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: var(--font); font-size: 0.95rem; font-weight: 700;
  padding: 0.7rem 1.8rem; border-radius: 4px; border: none;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em;
  white-space: nowrap;
}
.nf-btn svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
.nf-btn-play {
  background: #fff; color: #000;
}
.nf-btn-play:hover { background: rgba(255,255,255,0.75); }
.nf-btn-more {
  background: rgba(109,109,110,0.7); color: #fff;
  backdrop-filter: blur(4px);
}
.nf-btn-more:hover { background: rgba(109,109,110,0.4); }

/* ─────────────────────────────────────────────
   MAIN CONTENT AREA
───────────────────────────────────────────── */
#main-content { padding: 0 4% 6rem; }
.content-spacer { height: 68px; }

/* ─────────────────────────────────────────────
   CONTINUE WATCHING ROW  (Netflix style)
───────────────────────────────────────────── */
.nf-row { margin-bottom: 3rem; }
.nf-row-title {
  font-size: 1.2rem; font-weight: 700; color: var(--text2);
  margin-bottom: 0.75rem; letter-spacing: 0.01em;
}

.continue-grid {
  display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;
  scrollbar-width: none;
}
.continue-grid::-webkit-scrollbar { display: none; }

.cw-card {
  flex: 0 0 220px; position: relative;
  border-radius: 4px; overflow: hidden; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  background: var(--surface);
}
.cw-card:hover { transform: scale(1.04); box-shadow: 0 8px 24px rgba(0,0,0,0.7); z-index: 2; }
.cw-thumb {
  width: 100%; aspect-ratio: 16/9;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  position: relative; display: flex; align-items: center; justify-content: center;
}
.cw-ep-num {
  font-size: 2.2rem; font-weight: 700; color: rgba(255,255,255,0.08);
  font-style: italic;
}
.cw-play-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0); transition: background 0.2s;
}
.cw-card:hover .cw-play-overlay { background: rgba(0,0,0,0.4); }
.cw-play-icon {
  width: 40px; height: 40px; background: rgba(255,255,255,0.9); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(0.8); transition: opacity 0.2s, transform 0.2s;
}
.cw-card:hover .cw-play-icon { opacity: 1; transform: scale(1); }
.cw-play-icon svg { width: 16px; height: 16px; fill: #000; margin-left: 2px; }
.cw-progress-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,0.2);
}
.cw-progress-fill { height: 100%; background: var(--netflix-red); }
.cw-info { padding: 0.6rem 0.75rem 0.75rem; }
.cw-ep-label { font-size: 0.7rem; font-weight: 600; color: var(--text3); margin-bottom: 0.25rem; }
.cw-ep-title { font-size: 0.82rem; font-weight: 500; color: var(--text2); line-height: 1.3; }

/* ─────────────────────────────────────────────
   SEASON SELECTOR  (Netflix dropdown style)
───────────────────────────────────────────── */
.season-selector-row {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem; margin-bottom: 1.2rem;
}
.season-selector-left { display: flex; align-items: center; gap: 1rem; }
.nf-row-title-big {
  font-size: 1.4rem; font-weight: 700; color: #fff;
}

.season-dropdown-wrap { position: relative; }
.season-dropdown {
  appearance: none; -webkit-appearance: none;
  background: var(--bg-light); color: #fff;
  border: 1px solid rgba(255,255,255,0.25); border-radius: 4px;
  font-family: var(--font); font-size: 0.88rem; font-weight: 600;
  padding: 0.45rem 2.2rem 0.45rem 0.85rem;
  cursor: pointer; outline: none; transition: border-color 0.15s;
  min-width: 130px;
}
.season-dropdown:hover { border-color: rgba(255,255,255,0.5); }
.season-dropdown option { background: #1a1a1a; }
.dropdown-arrow {
  position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: #fff;
}
.dropdown-arrow svg { width: 14px; height: 14px; fill: currentColor; }

.surprise-btn {
  display: flex; align-items: center; gap: 0.45rem;
  background: transparent; border: 1px solid rgba(255,255,255,0.3);
  color: var(--text2); font-family: var(--font); font-size: 0.8rem; font-weight: 600;
  padding: 0.42rem 1rem; border-radius: 4px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.surprise-btn:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.06); }
.surprise-btn svg { width: 14px; height: 14px; fill: currentColor; }
.surprise-btn.spinning svg { animation: spinonce 0.5s ease; }
@keyframes spinonce { to { transform: rotate(360deg); } }

/* ─────────────────────────────────────────────
   EPISODE LIST  (Netflix exact layout)
───────────────────────────────────────────── */
.ep-list { display: flex; flex-direction: column; gap: 0; }

.ep-item {
  display: grid;
  grid-template-columns: 48px 180px 1fr;
  gap: 0 1.2rem;
  align-items: center;
  padding: 1rem 0.5rem;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.ep-item:last-child { border-bottom: none; }
.ep-item:hover { background: rgba(255,255,255,0.07); }
.ep-item.ep-active { background: rgba(255,255,255,0.05); }
.ep-item.ep-watched { opacity: 0.5; }
.ep-item.ep-watched:hover { opacity: 0.85; }

.ep-item-num {
  text-align: center; font-size: 1.4rem; font-weight: 700;
  color: var(--text3); user-select: none;
}
.ep-item.ep-active .ep-item-num { color: var(--text2); }

.ep-item-thumb {
  position: relative; width: 180px; aspect-ratio: 16/9;
  border-radius: 4px; overflow: hidden; flex-shrink: 0;
  background: linear-gradient(135deg, #1f1f1f, #2a2a3a);
  display: flex; align-items: center; justify-content: center;
}
.ep-thumb-inner { font-size: 2.2rem; font-weight: 700; color: rgba(255,255,255,0.06); font-style: italic; }
.ep-thumb-play {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0); transition: background 0.15s;
}
.ep-item:hover .ep-thumb-play { background: rgba(0,0,0,0.45); }
.ep-thumb-play-btn {
  width: 36px; height: 36px; background: rgba(255,255,255,0.9); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(0.7); transition: opacity 0.18s, transform 0.22s;
}
.ep-item:hover .ep-thumb-play-btn { opacity: 1; transform: scale(1); }
.ep-thumb-play-btn svg { width: 14px; height: 14px; fill: #000; margin-left: 2px; }
.ep-thumb-progress {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,0.2);
}
.ep-thumb-progress-fill { height: 100%; background: var(--netflix-red); }
.ep-watched-check {
  position: absolute; top: 6px; right: 6px; z-index: 2;
  width: 20px; height: 20px; background: rgba(0,0,0,0.7); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.ep-watched-check svg { width: 12px; height: 12px; fill: var(--green); }

.ep-item-info {}
.ep-item-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 0.4rem; gap: 0.5rem;
}
.ep-item-title { font-size: 0.9rem; font-weight: 600; color: #fff; line-height: 1.2; }
.ep-item-dur { font-size: 0.78rem; color: var(--text3); white-space: nowrap; flex-shrink: 0; }
.ep-item-desc {
  font-size: 0.78rem; color: var(--text3); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* ─────────────────────────────────────────────
   FULLSCREEN PLAYER  (Netflix modal)
───────────────────────────────────────────── */
#player-modal {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: #000;
  flex-direction: column;
}
#player-modal.open { display: flex; animation: playerFadeIn 0.3s ease; }
@keyframes playerFadeIn { from { opacity: 0; } to { opacity: 1; } }

.player-top-bar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: 1.2rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
  animation: fadeIn 0.3s ease;
}
.player-back {
  display: flex; align-items: center; gap: 0.6rem;
  background: transparent; border: none; color: #fff; cursor: pointer;
  font-family: var(--font); font-size: 0.9rem; font-weight: 600;
  padding: 0.4rem; border-radius: 4px; transition: opacity 0.15s;
}
.player-back:hover { opacity: 0.7; }
.player-back svg { width: 22px; height: 22px; fill: currentColor; }

.player-title-bar { text-align: center; }
.player-show-name { font-size: 0.72rem; font-weight: 700; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.2rem; }
.player-ep-title  { font-size: 1rem; font-weight: 700; color: #fff; }

.player-top-right { display: flex; gap: 0.5rem; }
.player-ctrl-btn {
  background: rgba(0,0,0,0.5); border: none; color: #fff;
  width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: background 0.15s;
}
.player-ctrl-btn:hover { background: rgba(255,255,255,0.15); }
.player-ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; }

/* The iframe fills the whole screen */
#flixer-iframe {
  position: absolute; inset: 0; width: 100%; height: 100%; border: none; z-index: 1;
}

/* Progress bar overlay at bottom */
.player-bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  padding: 0 2rem 1.5rem;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
}
.player-seek-row {
  display: flex; align-items: center; gap: 1rem; margin-bottom: 0.8rem;
}
.player-time { font-size: 0.78rem; color: rgba(255,255,255,0.7); font-variant-numeric: tabular-nums; min-width: 42px; font-weight: 500; }
.player-time.right { text-align: right; }
.player-seekbar {
  flex: 1; height: 4px; background: rgba(255,255,255,0.25);
  border-radius: 4px; cursor: pointer; position: relative;
  transition: height 0.15s;
}
.player-seekbar:hover { height: 6px; }
.player-seek-fill {
  height: 100%; background: var(--netflix-red); border-radius: 4px;
  position: relative; pointer-events: none;
}
.player-seek-fill::after {
  content: '';
  position: absolute; right: -6px; top: 50%; transform: translateY(-50%) scale(0);
  width: 14px; height: 14px; background: var(--netflix-red); border-radius: 50%;
  transition: transform 0.15s;
}
.player-seekbar:hover .player-seek-fill::after { transform: translateY(-50%) scale(1); }

.player-ctrl-row {
  display: flex; align-items: center; justify-content: space-between;
}
.player-ctrl-left, .player-ctrl-right { display: flex; align-items: center; gap: 0.5rem; }

.p-btn {
  background: transparent; border: none; color: rgba(255,255,255,0.8);
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.p-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
.p-btn svg { width: 22px; height: 22px; fill: currentColor; }
.p-btn.big { width: 50px; height: 50px; }
.p-btn.big svg { width: 30px; height: 30px; }

.skip-chip {
  background: transparent; border: 2px solid rgba(255,255,255,0.5);
  color: rgba(255,255,255,0.8); font-family: var(--font); font-size: 0.78rem; font-weight: 700;
  padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.skip-chip:hover { border-color: #fff; color: #fff; }

.next-ep-chip {
  display: flex; align-items: center; gap: 0.4rem;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; font-family: var(--font); font-size: 0.8rem; font-weight: 700;
  padding: 0.45rem 1.1rem; border-radius: 4px; cursor: pointer; transition: all 0.15s;
  backdrop-filter: blur(4px);
}
.next-ep-chip:hover { background: rgba(255,255,255,0.18); }
.next-ep-chip svg { width: 14px; height: 14px; fill: currentColor; }

/* Auto-play next ep notification */
#next-up-toast {
  position: absolute; bottom: 90px; right: 2rem; z-index: 20;
  background: rgba(30,30,30,0.95); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; padding: 1rem 1.2rem; min-width: 280px;
  display: none; animation: slideIn 0.3s ease;
  backdrop-filter: blur(8px);
}
@keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
#next-up-toast.show { display: block; }
.next-up-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.4rem; }
.next-up-title { font-size: 0.88rem; font-weight: 700; color: #fff; margin-bottom: 0.8rem; }
.next-up-btns { display: flex; gap: 0.5rem; }
.next-up-play { flex: 1; background: #fff; color: #000; border: none; border-radius: 4px; font-family: var(--font); font-size: 0.8rem; font-weight: 700; padding: 0.5rem; cursor: pointer; transition: background 0.15s; }
.next-up-play:hover { background: rgba(255,255,255,0.8); }
.next-up-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: var(--text2); border-radius: 4px; font-family: var(--font); font-size: 0.8rem; font-weight: 600; padding: 0.5rem 0.8rem; cursor: pointer; transition: all 0.15s; }
.next-up-cancel:hover { border-color: #fff; color: #fff; }

/* Volume */
.vol-wrap { display: flex; align-items: center; gap: 0.4rem; }
.vol-slider { width: 70px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 4px; cursor: pointer; overflow: hidden; }
.vol-fill { height: 100%; width: 80%; background: #fff; border-radius: 4px; pointer-events: none; }

/* ─────────────────────────────────────────────
   TOAST
───────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(30,30,30,0.97); color: #fff;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 0.65rem 1.4rem; border-radius: 4px;
  font-size: 0.82rem; font-weight: 500;
  opacity: 0; transition: opacity 0.25s, transform 0.3s cubic-bezier(0.16,1,0.3,1);
  z-index: 99999; pointer-events: none; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─────────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────────── */
@media (max-width: 768px) {
  .nf-header { padding: 0 3%; height: 56px; }
  #main-content { padding: 0 3% 5rem; }
  #nf-hero { height: 70vw; max-height: 420px; }
  .hero-content { bottom: 18%; }
  .ep-item { grid-template-columns: 36px 130px 1fr; gap: 0 0.8rem; }
  .ep-item-thumb { width: 130px; }
  .ep-item-desc { display: none; }
  .player-top-bar { padding: 0.8rem 1rem; }
  .player-bottom-bar { padding: 0 1rem 1rem; }
  .hero-btns .nf-btn { font-size: 0.82rem; padding: 0.6rem 1.2rem; }
}
@media (max-width: 480px) {
  .ep-item { grid-template-columns: 28px 100px 1fr; padding: 0.75rem 0.25rem; }
  .ep-item-thumb { width: 100px; }
  .ep-item-num { font-size: 1rem; }
  .vol-wrap { display: none; }
  .player-title-bar { display: none; }
}
</style>
</head>
<body>

<!-- ── NETFLIX HEADER ─────────────────────────────── -->
<header class="nf-header" id="nf-header">
  <div class="nf-logo">FriendsTV</div>
  <div class="nf-header-right">
    <div class="nf-stat">
      <span id="stat-text" class="watched-count">0 / 236</span>
      <span>watched</span>
    </div>

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
const SK = 'friendstv_v1';
let ST = (() => { try { const r = localStorage.getItem(SK); if(r) return JSON.parse(r); } catch(e){} return { lastSI: 0, lastEI: 0, eps: {} }; })();
const persist = () => localStorage.setItem(SK, JSON.stringify(ST));
const ekey = (si, ei) => si + ':' + ei;
const getE  = (si, ei) => ST.eps[ekey(si,ei)] || { t: 0, w: false };
const setE  = (si, ei, d) => { ST.eps[ekey(si,ei)] = Object.assign({}, getE(si,ei), d); persist(); };

let curSI = 0;      // currently displayed season index
let curEp = null;   // { si, ei } playing right now

/* Wall-clock playback */
let playing = false, rafId = null;
let clock = 0, total = 0;
let wallStart = null, clockAtStart = 0, lastSave = 0;
let nextUpTimer = null;

/* ══════════════════════════════════════════════════════════
   SCROLL HEADER
══════════════════════════════════════════════════════════ */
window.addEventListener('scroll', () => {
  document.getElementById('nf-header').classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
function init() {
  // Build season dropdown
  const sel = document.getElementById('season-select');
  SEASONS.forEach((S, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = 'Season ' + S.s;
    sel.appendChild(opt);
  });

  updateHero();
  renderEpList();
  renderContinueWatching();
  updateStat();
}

/* ══════════════════════════════════════════════════════════
   HERO
══════════════════════════════════════════════════════════ */
function updateHero() {
  const anyProgress = Object.values(ST.eps).some(e => e.t > 0 || e.w);
  const hero = document.getElementById('nf-hero');
  const spacer = document.getElementById('top-spacer');

  if (anyProgress) {
    hero.style.display = 'block';
    spacer.style.display = 'none';

    const e = getE(ST.lastSI, ST.lastEI);
    const S = SEASONS[ST.lastSI];
    const lbl = document.getElementById('hero-play-label');
    if (e.w) {
      const nx = nextFrom(ST.lastSI, ST.lastEI);
      lbl.textContent = nx ? 'Play S' + SEASONS[nx.si].s + ' E' + (nx.ei+1) : 'Play';
    } else {
      const m = Math.floor(e.t/60), sc = String(Math.floor(e.t%60)).padStart(2,'0');
      lbl.textContent = 'Resume S'+S.s+' E'+(ST.lastEI+1)+' • '+m+':'+sc;
    }
  } else {
    hero.style.display = 'none';
    spacer.style.display = 'block';
  }
}

/* ══════════════════════════════════════════════════════════
   CONTINUE WATCHING ROW
══════════════════════════════════════════════════════════ */
function renderContinueWatching() {
  const inProgress = [];
  SEASONS.forEach((S, si) => {
    S.eps.forEach((_, ei) => {
      const e = getE(si, ei);
      if (e.t > 30 && !e.w) inProgress.push({ si, ei, e });
    });
  });

  const row  = document.getElementById('cw-row');
  const grid = document.getElementById('cw-grid');

  if (!inProgress.length) { row.style.display = 'none'; return; }
  row.style.display = 'block';
  grid.innerHTML = '';

  inProgress.slice(0, 10).forEach(({ si, ei, e }) => {
    const S = SEASONS[si]; const title = S.eps[ei];
    const pct = Math.min((e.t / EP_DUR) * 100, 100);
    const card = document.createElement('div');
    card.className = 'cw-card';
    card.onclick = () => openPlayer(si, ei);
    card.innerHTML =
      '<div class="cw-thumb">' +
        '<div class="cw-ep-num">' + String(ei+1).padStart(2,'0') + '</div>' +
        '<div class="cw-play-overlay"><div class="cw-play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>' +
        '<div class="cw-progress-bar"><div class="cw-progress-fill" style="width:'+pct+'%"></div></div>' +
      '</div>' +
      '<div class="cw-info">' +
        '<div class="cw-ep-label">S'+S.s+' E'+(ei+1)+'</div>' +
        '<div class="cw-ep-title">'+title+'</div>' +
      '</div>';
    grid.appendChild(card);
  });
}

/* ══════════════════════════════════════════════════════════
   EPISODE LIST
══════════════════════════════════════════════════════════ */
function onSeasonChange() {
  curSI = parseInt(document.getElementById('season-select').value);
  renderEpList();
}

function renderEpList() {
  const S = SEASONS[curSI];
  const list = document.getElementById('ep-list');
  list.innerHTML = '';

  S.eps.forEach((title, ei) => {
    const e   = getE(curSI, ei);
    const pct = e.t > 0 ? Math.min((e.t / EP_DUR) * 100, 100) : 0;
    const desc = DESCRIPTIONS[curSI+':'+ei] || DEFAULT_DESC;
    const isActive = curEp && curEp.si === curSI && curEp.ei === ei;

    const item = document.createElement('div');
    item.className = 'ep-item'
      + (e.w ? ' ep-watched' : '')
      + (isActive ? ' ep-active' : '');
    item.id = 'ep-item-' + curSI + '-' + ei;
    item.onclick = () => openPlayer(curSI, ei);

    item.innerHTML =
      '<div class="ep-item-num">' + (ei+1) + '</div>' +
      '<div class="ep-item-thumb">' +
        '<div class="ep-thumb-inner">' + String(ei+1).padStart(2,'0') + '</div>' +
        '<div class="ep-thumb-play"><div class="ep-thumb-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>' +
        (pct > 0 ? '<div class="ep-thumb-progress"><div class="ep-thumb-progress-fill" style="width:'+pct+'%"></div></div>' : '') +
        (e.w ? '<div class="ep-watched-check"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></div>' : '') +
      '</div>' +
      '<div class="ep-item-info">' +
        '<div class="ep-item-header">' +
          '<div class="ep-item-title">' + title + '</div>' +
          '<div class="ep-item-dur">22m</div>' +
        '</div>' +
        '<div class="ep-item-desc">' + desc + '</div>' +
      '</div>';

    list.appendChild(item);
  });
}

/* ══════════════════════════════════════════════════════════
   PLAYER
══════════════════════════════════════════════════════════ */
function openPlayer(si, ei) {
  const S = SEASONS[si]; const title = S.eps[ei]; const e = getE(si, ei);

  curEp = { si, ei };
  ST.lastSI = si; ST.lastEI = ei; persist();

  // Set iframe src — Flixer auto-plays from start
  document.getElementById('flixer-iframe').src = flixerURL(S.s, ei + 1);
  document.getElementById('player-ep-title').textContent = title;

  // Clock
  total = EP_DUR;
  clock = e.w ? 0 : (e.t || 0);

  // Open modal
  document.getElementById('player-modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  updateSeekUI();
  clockStart(); // start our progress clock in sync with iframe

  // Schedule "Next Up" card 2min before end
  clearTimeout(nextUpTimer);
  const timeToNextUp = (total - clock - 120) * 1000;
  if (timeToNextUp > 0) {
    nextUpTimer = setTimeout(showNextUp, timeToNextUp);
  }

  // Update episode list highlight
  refreshEpListForSeason(si);
}

function closePlayer() {
  clockStop(); saveClock();
  clearTimeout(nextUpTimer);
  dismissNextUp();
  document.getElementById('flixer-iframe').src = '';
  document.getElementById('player-modal').classList.remove('open');
  document.body.style.overflow = '';
  // Refresh UI
  updateHero(); renderContinueWatching(); renderEpList(); updateStat();
  curEp = null;
}

function saveClock() {
  if (!curEp) return;
  const { si, ei } = curEp;
  setE(si, ei, { t: clock, w: clock >= total * 0.92 });
  ST.lastSI = si; ST.lastEI = ei; persist();
}

/* ══════════════════════════════════════════════════════════
   WALL-CLOCK ENGINE
══════════════════════════════════════════════════════════ */
function clockStart() {
  if (playing) return;
  playing = true; wallStart = Date.now(); clockAtStart = clock;
  updatePlayIcon(); schedTick();
}
function clockPause() {
  if (!playing) return;
  clock = clockAtStart + (Date.now() - wallStart) / 1000;
  playing = false; updatePlayIcon(); cancelTick(); saveClock();
}
function clockStop() { playing = false; cancelTick(); }
function schedTick() { rafId = requestAnimationFrame(tick); }
function cancelTick() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

function tick() {
  if (!playing) return;
  clock = clockAtStart + (Date.now() - wallStart) / 1000;
  if (clock >= total) { clock = total; updateSeekUI(); onEnded(); return; }
  updateSeekUI();
  if (Date.now() - lastSave > 8000) { saveClock(); lastSave = Date.now(); }
  schedTick();
}

function onEnded() {
  clockStop(); playing = false; updatePlayIcon(); saveClock();
  showNextUp();
}

function togglePlay() { if (playing) clockPause(); else clockStart(); }
function updatePlayIcon() {
  document.getElementById('pp-icon').innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function onSeek(ev) {
  const bar = document.getElementById('p-seekbar'), r = bar.getBoundingClientRect();
  clock = Math.max(0, Math.min(1, (ev.clientX - r.left) / r.width)) * total;
  wallStart = Date.now(); clockAtStart = clock;
  updateSeekUI(); saveClock();
}

function skip(sec) {
  clock = Math.max(0, Math.min(total, clock + sec));
  wallStart = Date.now(); clockAtStart = clock;
  updateSeekUI();
  if (clock >= total) onEnded();
}

function updateSeekUI() {
  const pct = total > 0 ? (clock / total) * 100 : 0;
  document.getElementById('p-seek-fill').style.width = pct + '%';
  document.getElementById('p-now').textContent = fmt(clock);
  document.getElementById('p-end').textContent = fmt(total);
}
const fmt = s => Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');

/* ══════════════════════════════════════════════════════════
   NEXT UP CARD
══════════════════════════════════════════════════════════ */
function showNextUp() {
  if (!curEp) return;
  const nx = nextFrom(curEp.si, curEp.ei);
  if (!nx) return;
  const title = SEASONS[nx.si].eps[nx.ei];
  document.getElementById('next-up-title').textContent = 'S'+SEASONS[nx.si].s+' E'+(nx.ei+1)+' — '+title;
  document.getElementById('next-up-toast').classList.add('show');
}
function dismissNextUp() {
  document.getElementById('next-up-toast').classList.remove('show');
}
function skipToNext() {
  dismissNextUp();
  if (!curEp) return;
  const nx = nextFrom(curEp.si, curEp.ei);
  if (!nx) { toast('🎬 That was the series finale!'); closePlayer(); return; }
  clockStop();
  // Switch season in list if needed
  if (nx.si !== curSI) {
    curSI = nx.si;
    document.getElementById('season-select').value = curSI;
    renderEpList();
  }
  openPlayer(nx.si, nx.ei);
}

function nextFrom(si, ei) {
  let nei = ei + 1, nsi = si;
  if (nei >= SEASONS[si].eps.length) { nsi++; nei = 0; }
  if (nsi >= SEASONS.length) return null;
  return { si: nsi, ei: nei };
}

function refreshEpListForSeason(si) {
  if (si !== curSI) {
    curSI = si;
    document.getElementById('season-select').value = si;
    renderEpList();
  } else {
    // Just update active state
    document.querySelectorAll('.ep-item').forEach(el => el.classList.remove('ep-active'));
    const active = document.getElementById('ep-item-' + si + '-' + (curEp ? curEp.ei : -1));
    if (active) { active.classList.add('ep-active'); active.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  }
}

/* ══════════════════════════════════════════════════════════
   RESUME / RANDOM / HERO ACTIONS
══════════════════════════════════════════════════════════ */
function resumeOrPlay() {
  const e = getE(ST.lastSI, ST.lastEI);
  if (e.w) {
    const nx = nextFrom(ST.lastSI, ST.lastEI);
    if (nx) openPlayer(nx.si, nx.ei);
    else openPlayer(0, 0);
  } else {
    openPlayer(ST.lastSI, ST.lastEI);
  }
}

function playRandom() {
  const btn = document.getElementById('surprise-btn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 500);

  let total_eps = 0;
  SEASONS.forEach(S => total_eps += S.eps.length);
  const pick = Math.floor(Math.random() * total_eps);
  let count = 0;
  for (let si = 0; si < SEASONS.length; si++) {
    for (let ei = 0; ei < SEASONS[si].eps.length; ei++) {
      if (count === pick) { openPlayer(si, ei); return; }
      count++;
    }
  }
}

function scrollToEpisodes() {
  document.getElementById('episodes-section').scrollIntoView({ behavior: 'smooth' });
}

function resetProgress() {
  if (!confirm('Reset all watch progress?')) return;
  localStorage.removeItem(SK);
  ST = { lastSI: 0, lastEI: 0, eps: {} };
  updateHero(); renderContinueWatching(); renderEpList(); updateStat();
  toast('Progress cleared');
}

/* ══════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════ */
function updateStat() {
  let w = 0, t = 0;
  SEASONS.forEach((S, si) => S.eps.forEach((_, ei) => { t++; if(getE(si,ei).w) w++; }));
  document.getElementById('stat-text').textContent = w + ' / ' + t;
}

function toggleMute() {
  const ico = document.getElementById('vol-icon');
  ico.innerHTML = ico.innerHTML.includes('M16.5')
    ? '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>'
    : '<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17 18.73l2 2L20.73 19 4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>';
}

function setVol(ev) {
  const bar = document.querySelector('.vol-slider'), r = bar.getBoundingClientRect();
  document.getElementById('vol-fill').style.width = (Math.max(0, Math.min(1, (ev.clientX - r.left) / r.width)) * 100) + '%';
}

let toastTmr;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTmr); toastTmr = setTimeout(() => el.classList.remove('show'), 2800);
}

/* ══════════════════════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', ev => {
  if (!document.getElementById('player-modal').classList.contains('open')) return;
  if (ev.key === 'Escape')      closePlayer();
  if (ev.key === ' ')           { ev.preventDefault(); togglePlay(); }
  if (ev.key === 'ArrowRight')  skip(30);
  if (ev.key === 'ArrowLeft')   skip(-10);
  if (ev.key === 'n' || ev.key === 'N') skipToNext();
});

/* ══════════════════════════════════════════════════════════
   START
══════════════════════════════════════════════════════════ */
init();
</script>
</body>
